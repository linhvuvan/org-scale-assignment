services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  be:
    build:
      context: ./be
    environment:
      PORT: "3000"
      NODE_ENV: development
      DATABASE_URL: postgres://app:app@db:5432/app
      JWT_SECRET: dev-secret
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./be/src:/app/src
      - ./be/drizzle:/app/drizzle
      - be_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && npm run dev"

  fe:
    build:
      context: ./fe
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./fe/src:/app/src
      - fe_node_modules:/app/node_modules
    depends_on:
      - be

volumes:
  postgres_data:
  postgres_test_data:
  be_node_modules:
  fe_node_modules:
